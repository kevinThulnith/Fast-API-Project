name: CI/CD Pipeline

on:
  pull_request:
    branches: [test]
  push:
    branches: [test]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  API-CI:
    name: API CI
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
    steps:
      - name: Checkout code changes
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Start API server
        run: |
          # !Make sure the venv exists and is synced before we background anything.
          uv run python -c "print('venv ready')"

          # !Run uvicorn directly from the venv (NOT via `uv run`) so there is no
          # !long-lived `uv` parent process holding a lock on the uv cache.
          nohup .venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000 > server.log 2>&1 &
          echo $! > server.pid

          for i in {1..30}; do
            if curl -s -f http://localhost:8000/api/health > /dev/null; then
              echo "Server is up!"
              break
            fi
            echo "Waiting for server..."
            sleep 2
          done

      - name: Run first test
        run: uv run pytest tests/test.py -v --csv=first_test.csv --csv-columns=id,status,duration,message --cov=main --cov-report=json:first_test_coverage.json

      - name: Run second test
        run: uv run pytest tests_generated/generated_test.py -v --csv=second_test.csv --csv-columns=id,status,duration,message --cov=main --cov-report=json:second_test_coverage.json

      - name: Run generated test
        run: uv run tests_generated/generator.py

      - name: Run test selector
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin ${{ github.base_ref }}
            DIFF=$(git diff origin/${{ github.base_ref }}...HEAD)
          else
            DIFF=$(git diff HEAD~1)
          fi
          echo "$DIFF" > /tmp/diff.txt
          uv run python tests_selecter/selecter.py --diff /tmp/diff.txt --extra-tests tests_generated/generated_tests.py --run-medium --no-heal --csv-out selecter_results.csv

      - name: Ensure coverage_selector.json exists
        if: always()
        run: |
          if [ ! -f coverage_selector.json ]; then
            echo "::warning::coverage_selector.json was not produced (likely zero tests selected) — writing placeholder."
            echo '{"meta": {"note": "no tests were selected by TestSelectAgent on this run"}, "files": {}, "totals": {"covered_lines": 0, "num_statements": 0, "percent_covered": 0.0, "percent_covered_display": "0", "missing_lines": 0, "excluded_lines": 0}}' > coverage_selector.json
          fi

      - name: Generate traditional vs agentic comparison report
        if: always()
        run: |
          uv run python tests_selecter/comparison_report.py \
            --first-test-csv first_test.csv \
            --first-test-coverage first_test_coverage.json \
            --second-test-csv second_test.csv \
            --second-test-coverage second_test_coverage.json \
            --selector-csv selecter_results.csv \
            --selector-coverage coverage_selector.json \
            --out reports/comparison_report.csv

      - name: Upload Test Results Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: |
            server.log
            first_test.csv
            first_test_coverage.json
            second_test.csv
            second_test_coverage.json
            generated_test_results.csv
            generated_test_coverage.json
            selecter_results.csv
            coverage_selector.json
            reports/comparison_report.csv
          retention-days: 7

      - name: Stop API server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" 2>/dev/null || true
            sleep 1
          fi
          # !Belt-and-suspenders: catch anything matching by name too.
          pkill -9 -f "uvicorn main:app" 2>/dev/null || true
          sleep 1

      - name: Debug - check for lingering uv/uvicorn processes
        if: always()
        run: ps aux | grep -E "uv|uvicorn" | grep -v grep || echo "none found"
